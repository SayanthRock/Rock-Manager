name: Android APK Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0. Leave empty to auto-generate one."
        required: false
        default: ""
      create_release:
        description: "Create a GitHub Release after the APK build succeeds"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Build release APK
        run: gradle --no-daemon clean :app:assembleRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Release APK was not generated."
            exit 1
          fi
          cp "$APK_PATH" "release/Rock-Manager-${GITHUB_SHA::7}.apk"
          ls -lah release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rock-Manager-APK
          path: release/*.apk
          if-no-files-found: error

      - name: Resolve release tag
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Rock Manager ${{ env.RELEASE_TAG }}
          files: release/*.apk
          generate_release_notes: true
